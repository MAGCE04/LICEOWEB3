<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiceoWeb3 - Próximamente</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
</head>

<body>
    <div class="ambient-light"></div>
    <div class="container">
        <div class="logo-wrapper">
            <svg width="250" height="250" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="main-logo">
                <g fill="#ffffff">
                    <rect x="25" y="10" width="50" height="4" />
                    <rect x="15" y="20" width="70" height="8" />
                    <rect x="25" y="34" width="10" height="36" />
                    <rect x="42" y="34" width="16" height="36" />
                    <rect x="65" y="34" width="10" height="36" />
                    <rect x="15" y="76" width="70" height="8" />
                    <rect x="25" y="90" width="50" height="4" />
                </g>
            </svg>
        </div>

        <div class="countdown-container">
            <div class="time-block">
                <span class="number" id="days">00</span>
                <span class="label">Días</span>
            </div>
            <span class="separator">:</span>
            <div class="time-block">
                <span class="number" id="hours">00</span>
                <span class="label">Horas</span>
            </div>
            <span class="separator">:</span>
            <div class="time-block">
                <span class="number" id="minutes">00</span>
                <span class="label">Minutos</span>
            </div>
            <span class="separator">:</span>
            <div class="time-block">
                <span class="number" id="seconds">00</span>
                <span class="label">Segundos</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
