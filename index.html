<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiceoWeb3 - Próximamente</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
</head>

<body>
    <div class="edge-light edge-light--left"></div>
    <div class="edge-light edge-light--right"></div>
    <div class="edge-light edge-light--top"></div>
    <div class="edge-light edge-light--bottom"></div>
    <div class="container">
        <div class="logo-wrapper">
            <svg width="250" height="250" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="main-logo">
                <g fill="#ffffff">
                    <!-- Top thin bar -->
                    <rect x="28" y="6" width="44" height="3" />
                    <!-- Top thick bar -->
                    <rect x="20" y="12" width="60" height="7" />
                    <!-- Left column (tapered - wider at bottom) -->
                    <polygon points="30,22 41,22 41,72 23,72" />
                    <!-- Center column -->
                    <rect x="45" y="22" width="10" height="50" />
                    <!-- Right column (tapered - wider at bottom) -->
                    <polygon points="59,22 70,22 77,72 59,72" />
                    <!-- Bottom thick bar -->
                    <rect x="19" y="75" width="62" height="7" />
                    <!-- Bottom thin bar -->
                    <rect x="26" y="85" width="48" height="3" />
                </g>
            </svg>
        </div>

        <div class="countdown-container">
            <div class="time-block">
                <span class="number" id="days">00</span>
                <span class="label">Días</span>
            </div>
            <span class="separator">:</span>
            <div class="time-block">
                <span class="number" id="hours">00</span>
                <span class="label">Horas</span>
            </div>
            <span class="separator">:</span>
            <div class="time-block">
                <span class="number" id="minutes">00</span>
                <span class="label">Minutos</span>
            </div>
            <span class="separator">:</span>
            <div class="time-block">
                <span class="number" id="seconds">00</span>
                <span class="label">Segundos</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
