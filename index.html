<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiceoWeb3 - Próximamente</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
</head>

<body>
    <div class="edge-light edge-light--left"></div>
    <div class="edge-light edge-light--right"></div>
    <div class="edge-light edge-light--top"></div>
    <div class="edge-light edge-light--bottom"></div>
    <div class="container">
        <div class="logo-wrapper">
            <img src="logo.svg" alt="LiceoWeb3 Logo" class="main-logo">
        </div>

        <div class="countdown-container">
            <div class="time-block">
                <span class="number" id="days">00</span>
                <span class="label">Días</span>
            </div>
            <span class="separator">:</span>
            <div class="time-block">
                <span class="number" id="hours">00</span>
                <span class="label">Horas</span>
            </div>
            <span class="separator">:</span>
            <div class="time-block">
                <span class="number" id="minutes">00</span>
                <span class="label">Minutos</span>
            </div>
            <span class="separator">:</span>
            <div class="time-block">
                <span class="number" id="seconds">00</span>
                <span class="label">Segundos</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
